<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ABC Company</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>ABC COMPANY</h1>
  <p>Professional Business Platform</p>
  <a href="login.html">Admin Login</a>
</header>

<nav>
  <a href="#about">公司</a>
  <a href="#staff">团队</a>
  <a href="#jobs">招聘</a>
</nav>

<section class="container">

  <div class="card" id="about">
    <h2>公司介绍</h2>
    <p>我们是一家全球化科技与管理公司，专注人才与项目管理系统开发。</p>
  </div>

  <div class="card" id="staff">
    <h2>团队成员</h2>
    <div id="staffList"></div>
  </div>

  <div class="card" id="jobs">
    <h2>职位招聘</h2>
    <div id="jobList"></div>
  </div>

  <div class="card" id="detail"></div>

</section>

<script>
let jobs = JSON.parse(localStorage.getItem("jobs")) || [
  {title:"Software Developer", desc:"负责系统开发与维护"},
  {title:"HR Manager", desc:"负责招聘与员工管理"},
  {title:"Project Manager", desc:"负责项目规划与执行"}
];

let staff = [
  "John CEO",
  "Emily HR",
  "Michael Engineer"
];

// staff
document.getElementById("staffList").innerHTML =
staff.map(s=>`<p>👤 ${s}</p>`).join("");

// jobs
function renderJobs(){
  document.getElementById("jobList").innerHTML =
  jobs.map((j,i)=>`
    <div class="job" onclick="show(${i})">
      ${j.title}
    </div>
  `).join("");
}
renderJobs();

function show(i){
  document.getElementById("detail").innerHTML =
  `<h3>${jobs[i].title}</h3><p>${jobs[i].desc}</p>`;
}
</script>

</body>
</html>
